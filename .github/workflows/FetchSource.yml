name: Diagnose Divider Source

on:
  workflow_dispatch:
  push:
    branches:
      - QwenMirror

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: QwenCode
          fetch-depth: 1

      - name: Extract divider-related source
        shell: bash
        run: |
          set -euo pipefail
          R="divider_diagnosis.txt"

          # 安全读取文件内容
          safe_cat() {
            if [ -f "$1" ]; then
              cat "$1"
            else
              echo "[FILE NOT FOUND] $1"
            fi
          }

          # 安全执行 sed（若文件不存在则输出提示）
          safe_sed() {
            if [ -f "$1" ]; then
              sed -n "$2" "$1"
            else
              echo "[FILE NOT FOUND] $1"
            fi
          }

          {
            echo "# Divider Diagnosis"
            echo "# Commit: $(git rev-parse HEAD)"
            echo "# Date: $(date -u)"
            echo ""

            echo "## [1] OptionsFragment.kt – Slider replacement block"
            echo '```kotlin'
            safe_sed app/src/main/java/moe/echo/variablefonttest_n/OptionsFragment.kt '/Check MD3 Slider toggle/,/variationEditor?.setOnPreferenceChangeListener/p'
            echo '```'
            echo ""

            echo "## [2] preference_widget_slider.xml"
            echo '```xml'
            safe_cat app/src/main/res/layout/preference_widget_slider.xml
            echo '```'
            echo ""

            echo "## [3] options.xml – Variations category"
            echo '```xml'
            safe_sed app/src/main/res/xml/options.xml '/key="variations"/,/<\/PreferenceCategory>/p'
            echo '```'
            echo ""

            echo "## [4] themes.xml – preferenceTheme"
            echo '```xml'
            grep -A2 "preferenceTheme" app/src/main/res/values/themes.xml 2>/dev/null || echo "(preferenceTheme not found)"
            echo '```'
            echo ""

            echo "## [5] Check: does preference_widget_seekbar_md3.xml still exist?"
            echo '```'
            if [ -f "app/src/main/res/layout/preference_widget_seekbar_md3.xml" ]; then
              echo "EXISTS – should be deleted"
            else
              echo "DELETED – correct"
            fi
            echo '```'
            echo ""

            echo "## [6] Check: layoutResource references in OptionsFragment.kt"
            echo '```'
            grep -n "layoutResource" app/src/main/java/moe/echo/variablefonttest_n/OptionsFragment.kt 2>/dev/null || echo "No layoutResource references found"
            echo '```'
            echo ""

            echo "## [7] Check: MD3SeekBarPreference.kt exists"
            echo '```'
            if [ -f "app/src/main/java/moe/echo/variablefonttest_n/MD3SeekBarPreference.kt" ]; then
              echo "EXISTS"
              safe_cat app/src/main/java/moe/echo/variablefonttest_n/MD3SeekBarPreference.kt
            else
              echo "NOT FOUND – needs to be created"
            fi
            echo '```'
            echo ""

            echo "## [8] Check: options.xml uses MD3SeekBarPreference"
            echo '```'
            grep -c "MD3SeekBarPreference" app/src/main/res/xml/options.xml 2>/dev/null || echo "0 occurrences"
            grep -c "SeekBarPreference" app/src/main/res/xml/options.xml 2>/dev/null || echo "0 occurrences of SeekBarPreference"
            echo '```'
          } > "$R"
          cat "$R"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: divider-diagnosis
          path: divider_diagnosis.txt
          retention-days: 14