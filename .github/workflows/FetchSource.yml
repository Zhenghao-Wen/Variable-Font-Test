name: Extract Three Methods Verbatim

on:
  workflow_dispatch:
  push:
    branches:
      - QwenMirror

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: QwenCode
          fetch-depth: 1

      - name: Extract methods
        shell: bash
        run: |
          set -euo pipefail
          trap 'echo "❌ Error at line $LINENO (exit code $?)" >&2' ERR

          OF="app/src/main/java/moe/echo/variablefonttest_n/OptionsFragment.kt"

          # ── 安全函数 ──
          safe_cat_range() {
            local file="$1" start="$2" end="$3"
            if [ ! -f "$file" ]; then
              echo "[FILE NOT FOUND] $file"
              return 0
            fi
            if [ -z "$start" ] || [ "$start" -le 0 ]; then
              echo "(line range invalid)"
              return 0
            fi
            if [ -z "$end" ]; then
              end="$start"
            fi
            sed -n "${start},${end}p" "$file" 2>/dev/null || echo "(sed error)"
          }

          get_line() {
            local pattern="$1" file="$2"
            if [ ! -f "$file" ]; then
              echo ""
              return 0
            fi
            grep -n "$pattern" "$file" 2>/dev/null | head -1 | cut -d: -f1 || echo ""
          }

          get_method_end() {
            local file="$1" start="$2"
            if [ ! -f "$file" ] || [ -z "$start" ] || [ "$start" -le 0 ]; then
              echo ""
              return 0
            fi
            # 查找下一个以 4 空格开头的 fun/override/private 行
            awk -v s="$start" 'NR>s && /^    (override |private |fun )/{print NR; exit}' "$file" 2>/dev/null || echo ""
          }

          safe_grep() {
            local pattern="$1" file="$2"
            if [ ! -f "$file" ]; then
              echo "[FILE NOT FOUND] $file"
              return 0
            fi
            grep -n "$pattern" "$file" 2>/dev/null || echo "(no matches)"
          }

          {
            echo "# Three Methods Verbatim"
            echo "# Commit: $(git rev-parse HEAD)"
            echo ""

            echo "## [1] companion object + fields (try lines 53-65, fallback to search)"
            echo '```kotlin'
            # 先尝试固定行号，若失败则用 grep 定位
            if [ -f "$OF" ]; then
              sed -n '53,65p' "$OF" 2>/dev/null | grep -q . && sed -n '53,65p' "$OF" || {
                echo "# Fixed lines 53-65 not valid; searching companion object:"
                START=$(get_line "companion object" "$OF")
                if [ -n "$START" ]; then
                  END=$((START + 15))
                  safe_cat_range "$OF" "$START" "$END"
                else
                  echo "companion object not found"
                fi
              }
            else
              echo "[FILE NOT FOUND] $OF"
            fi
            echo '```'
            echo ""

            echo "## [2] onPause method (exact lines)"
            echo '```kotlin'
            START=$(get_line "override fun onPause" "$OF")
            if [ -n "$START" ]; then
              END=$(get_method_end "$OF" "$START")
              if [ -n "$END" ]; then
                safe_cat_range "$OF" "$START" "$((END-1))"
              else
                # 如果找不到下一个方法，取后续 20 行
                safe_cat_range "$OF" "$START" "$((START+20))"
              fi
            else
              echo "onPause NOT FOUND"
            fi
            echo '```'
            echo ""

            echo "## [3] persistSettings method (exact lines)"
            echo '```kotlin'
            START=$(get_line "private fun persistSettings" "$OF")
            if [ -n "$START" ]; then
              END=$(get_method_end "$OF" "$START")
              if [ -n "$END" ]; then
                safe_cat_range "$OF" "$START" "$((END-1))"
              else
                safe_cat_range "$OF" "$START" "$((START+20))"
              fi
            else
              echo "persistSettings NOT FOUND"
            fi
            echo '```'
            echo ""

            echo "## [4] restoreSettings method (exact lines)"
            echo '```kotlin'
            START=$(get_line "private fun restoreSettings" "$OF")
            if [ -n "$START" ]; then
              END=$(get_method_end "$OF" "$START")
              if [ -n "$END" ]; then
                safe_cat_range "$OF" "$START" "$((END-1))"
              else
                safe_cat_range "$OF" "$START" "$((START+25))"
              fi
            else
              echo "restoreSettings NOT FOUND"
            fi
            echo '```'
            echo ""

            echo "## [5] onViewCreated 前 15 行（确认 restoreSettings 调用位置）"
            echo '```kotlin'
            START=$(get_line "override fun onViewCreated" "$OF")
            if [ -n "$START" ]; then
              safe_cat_range "$OF" "$START" "$((START+14))"
            else
              echo "onViewCreated NOT FOUND"
            fi
            echo '```'
            echo ""

            echo "## [6] 所有使用 PREF_ 常量的行"
            echo '```'
            safe_grep "PREF_VARIATION_STATE\|PREF_FEATURE_STATE\|PREF_FONT_VARIATION\|PREF_FONT_FEATURE" "$OF"
            echo '```'
            echo ""

            echo "## [7] 所有 joinToString / JSONObject / split 调用"
            echo '```'
            safe_grep "joinToString\|JSONObject\|\.split\|\\\\u0000\|\\\\u0001" "$OF"
            echo '```'
          } > three_methods.txt

          cat three_methods.txt

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: three-methods
          path: three_methods.txt
          retention-days: 7