name: Extract Full Context for Divider + Custom SeekBar Diagnosis

on:
  workflow_dispatch:
  push:
    branches:
      - QwenMirror

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: QwenCode
          fetch-depth: 1

      - name: Build report
        shell: bash
        run: |
          set -euo pipefail
          R="full_context_diagnosis.txt"
          LIMIT=51200
          CUR=0

          emit() {
            local f="$1" label="$2"
            [ -f "$f" ] || { echo "[MISSING] $f" >&2; return 0; }
            local body
            body=$(cat "$f")
            local sz=$(( ${#label} + ${#body} + ${#f} + 30 ))
            if (( CUR + sz > LIMIT )); then
              echo "[SKIP] $f" >&2; return 0
            fi
            { echo ""; echo "## [$label] $f"; echo '```'; echo "$body"; echo '```'; } >> "$R"
            CUR=$(( CUR + sz ))
            echo "[OK $(printf '%5d' "$sz")B] $f" >&2
          }

          {
            echo "# Full Context Diagnosis"
            echo "# Commit: $(git rev-parse HEAD)"
            echo "# Date: $(date -u)"
          } > "$R"
          CUR=$(wc -c < "$R")

          # ── 核心逻辑文件（必须完整）──
          emit "app/src/main/java/moe/echo/variablefonttest_n/OptionsFragment.kt" "CORE"
          emit "app/src/main/java/moe/echo/variablefonttest_n/SliderPreference.kt" "CORE"
          emit "app/src/main/java/moe/echo/variablefonttest_n/MD3SeekBarPreference.kt" "CORE"
          emit "app/src/main/java/moe/echo/variablefonttest_n/MainActivity.kt" "CORE"
          emit "app/src/main/java/moe/echo/variablefonttest_n/Constants.kt" "CORE"

          # ── 布局文件 ──
          emit "app/src/main/res/layout/preference_widget_slider.xml" "LAYOUT"
          emit "app/src/main/res/layout/activity_main.xml" "LAYOUT"
          emit "app/src/main/res/layout/main_fragment_content.xml" "LAYOUT"
          emit "app/src/main/res/layout/add_preference_dialog.xml" "LAYOUT"
          emit "app/src/main/res/layout/dialog_edit_text_md3.xml" "LAYOUT"

          # ── 检查已删除文件 ──
          {
            echo ""
            echo "## [CHECK] preference_widget_seekbar_md3.xml existence"
            echo '```'
            if [ -f "app/src/main/res/layout/preference_widget_seekbar_md3.xml" ]; then
              echo "EXISTS (should have been deleted)"
              cat app/src/main/res/layout/preference_widget_seekbar_md3.xml
            else
              echo "DELETED (correct)"
            fi
            echo '```'
          } >> "$R"

          # ── Preference XML ──
          emit "app/src/main/res/xml/options.xml" "PREF-XML"

          # ── 主题 ──
          emit "app/src/main/res/values/themes.xml" "THEME"

          # ── 字符串（确认 i18n）──
          emit "app/src/main/res/values/strings.xml" "STRINGS"
          emit "app/src/main/res/values-zh-rCN/strings.xml" "STRINGS"

          # ── 菜单 ──
          emit "app/src/main/res/menu/main_menu.xml" "MENU"

          # ── 目录树 ──
          {
            echo ""
            echo "## [TREE] Full resource + source tree"
            echo '```'
            find app/src/main/res app/src/main/java -type f | sort
            echo '```'
          } >> "$R"

          # ── 自动化检查 ──
          {
            echo ""
            echo "## [AUTO-CHECK]"
            echo '```'
            OF="app/src/main/java/moe/echo/variablefonttest_n/OptionsFragment.kt"

            echo "--- createAddPreferenceDialog: SeekBar type used ---"
            grep -n "SeekBarPreference\|MD3SeekBarPreference\|SliderPreference" "$OF" 2>/dev/null | head -30 || true

            echo ""
            echo "--- removePreference / addPreference / removeAll calls ---"
            grep -n "removePreference\|addPreference\|removeAll" "$OF" 2>/dev/null || true

            echo ""
            echo "--- onCreateRecyclerView / ItemDecoration / Divider ---"
            grep -n "onCreateRecyclerView\|ItemDecoration\|Divider\|divider" "$OF" 2>/dev/null || echo "(none found)"

            echo ""
            echo "--- layoutResource assignments ---"
            grep -n "layoutResource" "$OF" 2>/dev/null || echo "(none found)"

            echo ""
            echo "--- SliderPreference.kt: layoutResource ---"
            grep -n "layoutResource\|isIconSpaceReserved" \
              app/src/main/java/moe/echo/variablefonttest_n/SliderPreference.kt 2>/dev/null || true

            echo ""
            echo "--- preference_widget_slider.xml: root orientation ---"
            head -15 app/src/main/res/layout/preference_widget_slider.xml 2>/dev/null | grep "orientation" || echo "(orientation not found)"

            echo ""
            echo "--- preference_widget_slider.xml: RelativeLayout count ---"
            grep -c "RelativeLayout" app/src/main/res/layout/preference_widget_slider.xml 2>/dev/null || echo "0"

            echo ""
            echo "--- preference_widget_slider.xml: image_frame/icon_frame ---"
            grep "image_frame\|icon_frame" app/src/main/res/layout/preference_widget_slider.xml 2>/dev/null || echo "(none found)"

            echo ""
            echo "--- All layout files ---"
            ls -la app/src/main/res/layout/ 2>/dev/null || echo "(layout directory not found)"
            echo '```'
          } >> "$R"

          echo "Final size: $(wc -c < "$R") bytes"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: full-context-diagnosis
          path: full_context_diagnosis.txt
          retention-days: 14