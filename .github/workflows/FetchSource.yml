name: Verify SeekBar Tint & Slider Indent Fix

on:
  workflow_dispatch:
  push:
    branches:
      - QwenMirror

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: QwenCode
          fetch-depth: 1

      - name: Build verification report
        shell: bash
        run: |
          set -euo pipefail
          REPORT="tint_indent_verify.txt"

          # 安全读取文件内容（若不存在则输出提示）
          safe_cat() {
            if [ -f "$1" ]; then
              cat "$1"
            else
              echo "[FILE NOT FOUND] $1"
            fi
          }

          # 安全执行 sed（若文件不存在则输出提示）
          safe_sed() {
            if [ -f "$1" ]; then
              sed -n "$2" "$1"
            else
              echo "[FILE NOT FOUND] $1"
            fi
          }

          {
            echo "# SeekBar Tint & Slider Indent Fix Verification"
            echo "# Commit: $(git rev-parse HEAD)"
            echo "# Date: $(date -u)"
            echo ""

            echo "## [CHECK-1] preference_widget_seekbar_md3.xml exists and has colorPrimary tint"
            echo '```'
            if [ -f "app/src/main/res/layout/preference_widget_seekbar_md3.xml" ]; then
              echo "FILE EXISTS: YES"
              grep -n "progressTint\|thumbTint\|colorPrimary" app/src/main/res/layout/preference_widget_seekbar_md3.xml 2>/dev/null || echo "TINT ATTRIBUTES: NOT FOUND"
            else
              echo "FILE EXISTS: NO ← CRITICAL FAILURE"
            fi
            echo '```'
            echo ""

            echo "## [CHECK-2] OptionsFragment.kt sets layoutResource"
            echo '```'
            grep -n "layoutResource.*preference_widget_seekbar_md3\|preference_widget_seekbar_md3" \
              app/src/main/java/moe/echo/variablefonttest_n/OptionsFragment.kt 2>/dev/null \
              || echo "layoutResource assignment: NOT FOUND ← CRITICAL FAILURE"
            echo '```'
            echo ""

            echo "## [CHECK-3] SliderPreference.kt sets isIconSpaceReserved"
            echo '```'
            grep -n "isIconSpaceReserved" \
              app/src/main/java/moe/echo/variablefonttest_n/SliderPreference.kt 2>/dev/null \
              || echo "isIconSpaceReserved: NOT FOUND ← CRITICAL FAILURE"
            echo '```'
            echo ""

            echo "## [CHECK-4] Full preference_widget_seekbar_md3.xml"
            echo '```xml'
            safe_cat app/src/main/res/layout/preference_widget_seekbar_md3.xml
            echo '```'
            echo ""

            echo "## [CHECK-5] SliderPreference.kt init block"
            echo '```kotlin'
            safe_sed app/src/main/java/moe/echo/variablefonttest_n/SliderPreference.kt '/init {/,/}/p'
            echo '```'
            echo ""

            echo "## [CHECK-6] OptionsFragment.kt – context around layoutResource"
            echo '```kotlin'
            grep -n -B 2 -A 2 "preference_widget_seekbar_md3" \
              app/src/main/java/moe/echo/variablefonttest_n/OptionsFragment.kt 2>/dev/null \
              || echo "NOT FOUND"
            echo '```'
            echo ""

            echo "## [CHECK-7] Automated pass/fail"
            echo '```'
            PASS=0; FAIL=0

            if [ -f "app/src/main/res/layout/preference_widget_seekbar_md3.xml" ]; then
              echo "PASS: preference_widget_seekbar_md3.xml exists"; PASS=$((PASS+1))
            else
              echo "FAIL: preference_widget_seekbar_md3.xml missing"; FAIL=$((FAIL+1))
            fi

            if grep -q 'android:progressTint="?attr/colorPrimary"' app/src/main/res/layout/preference_widget_seekbar_md3.xml 2>/dev/null; then
              echo "PASS: progressTint=colorPrimary in layout"; PASS=$((PASS+1))
            else
              echo "FAIL: progressTint=colorPrimary NOT in layout"; FAIL=$((FAIL+1))
            fi

            if grep -q 'android:thumbTint="?attr/colorPrimary"' app/src/main/res/layout/preference_widget_seekbar_md3.xml 2>/dev/null; then
              echo "PASS: thumbTint=colorPrimary in layout"; PASS=$((PASS+1))
            else
              echo "FAIL: thumbTint=colorPrimary NOT in layout"; FAIL=$((FAIL+1))
            fi

            if grep -q 'seekbar' app/src/main/res/layout/preference_widget_seekbar_md3.xml 2>/dev/null; then
              echo "PASS: SeekBar id=seekbar in layout"; PASS=$((PASS+1))
            else
              echo "FAIL: SeekBar id=seekbar NOT in layout"; FAIL=$((FAIL+1))
            fi

            if grep -q 'seekbar_value' app/src/main/res/layout/preference_widget_seekbar_md3.xml 2>/dev/null; then
              echo "PASS: seekbar_value TextView in layout"; PASS=$((PASS+1))
            else
              echo "FAIL: seekbar_value TextView NOT in layout"; FAIL=$((FAIL+1))
            fi

            if grep -q 'preference_widget_seekbar_md3' app/src/main/java/moe/echo/variablefonttest_n/OptionsFragment.kt 2>/dev/null; then
              echo "PASS: OptionsFragment references custom layout"; PASS=$((PASS+1))
            else
              echo "FAIL: OptionsFragment does NOT reference custom layout"; FAIL=$((FAIL+1))
            fi

            if grep -q 'isIconSpaceReserved' app/src/main/java/moe/echo/variablefonttest_n/SliderPreference.kt 2>/dev/null; then
              echo "PASS: SliderPreference sets isIconSpaceReserved"; PASS=$((PASS+1))
            else
              echo "FAIL: SliderPreference does NOT set isIconSpaceReserved"; FAIL=$((FAIL+1))
            fi

            echo ""
            echo "RESULT: $PASS passed, $FAIL failed"
            echo '```'
          } > "$REPORT"

          cat "$REPORT"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: tint-indent-verify
          path: tint_indent_verify.txt
          retention-days: 14