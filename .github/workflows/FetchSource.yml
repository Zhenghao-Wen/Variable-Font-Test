name: Verify SeekBar & Slider Layout Fix

on:
  workflow_dispatch:
  push:
    branches:
      - QwenMirror

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: QwenCode
          fetch-depth: 1

      - name: Build verification report
        shell: bash
        run: |
          set -euo pipefail
          REPORT="layout_fix_verify.txt"

          # 辅助：安全读取文件内容
          safe_cat() {
            if [ -f "$1" ]; then
              cat "$1"
            else
              echo "[FILE NOT FOUND] $1"
            fi
          }

          {
            echo "# Layout & SeekBar Fix Verification"
            echo "# Commit: $(git rev-parse HEAD)"
            echo "# Date: $(date -u)"
            echo ""

            echo "## [CHECK-1] values/themes.xml"
            echo '```xml'
            safe_cat app/src/main/res/values/themes.xml
            echo '```'
            echo ""

            echo "## [CHECK-2] values-night/themes.xml"
            echo '```xml'
            safe_cat app/src/main/res/values-night/themes.xml
            echo '```'
            echo ""

            echo "## [CHECK-3] preference_widget_slider.xml"
            echo '```xml'
            safe_cat app/src/main/res/layout/preference_widget_slider.xml
            echo '```'
            echo ""

            echo "## [CHECK-4] options.xml (SeekBarPreference entries)"
            echo '```xml'
            if [ -f app/src/main/res/xml/options.xml ]; then
              grep -A 8 "SeekBarPreference" app/src/main/res/xml/options.xml || echo "(No SeekBarPreference found)"
            else
              echo "[FILE NOT FOUND] app/src/main/res/xml/options.xml"
            fi
            echo '```'
            echo ""

            echo "## [CHECK-5] SliderPreference.kt"
            echo '```kotlin'
            safe_cat app/src/main/java/moe/echo/variablefonttest_n/SliderPreference.kt
            echo '```'
            echo ""

            echo "## [CHECK-6] Automated checks"
            echo '```'
            # 每个检查使用 if 判断，避免 grep 失败导致脚本退出
            # Check 1
            if grep -q "android:seekBarStyle" app/src/main/res/values/themes.xml 2>/dev/null; then
              echo "PASS: android:seekBarStyle found in values/themes.xml"
            else
              echo "FAIL: android:seekBarStyle NOT found in values/themes.xml"
            fi

            # Check 2
            if grep -q "Widget.App.SeekBar.MD3Tint" app/src/main/res/values/themes.xml 2>/dev/null; then
              echo "PASS: Widget.App.SeekBar.MD3Tint style defined"
            else
              echo "FAIL: Widget.App.SeekBar.MD3Tint style NOT defined"
            fi

            # Check 3
            if grep -A 3 "Widget.App.SeekBar.MD3Tint" app/src/main/res/values/themes.xml 2>/dev/null | grep -q "colorPrimary"; then
              echo "PASS: colorPrimary referenced in SeekBar style"
            else
              echo "FAIL: colorPrimary NOT referenced in SeekBar style"
            fi

            # Check 4
            if grep -q "icon_frame" app/src/main/res/layout/preference_widget_slider.xml 2>/dev/null; then
              echo "PASS: icon_frame found in preference_widget_slider.xml"
            else
              echo "FAIL: icon_frame NOT found in preference_widget_slider.xml"
            fi

            # Check 5
            if grep -q "@android:id/icon" app/src/main/res/layout/preference_widget_slider.xml 2>/dev/null; then
              echo "PASS: @android:id/icon found in preference_widget_slider.xml"
            else
              echo "FAIL: @android:id/icon NOT found in preference_widget_slider.xml"
            fi

            # Check 6
            if grep -q "@android:id/title" app/src/main/res/layout/preference_widget_slider.xml 2>/dev/null; then
              echo "PASS: @android:id/title found"
            else
              echo "FAIL: @android:id/title NOT found"
            fi

            # Check 7
            if grep -q "@android:id/summary" app/src/main/res/layout/preference_widget_slider.xml 2>/dev/null; then
              echo "PASS: @android:id/summary found"
            else
              echo "FAIL: @android:id/summary NOT found"
            fi

            # Check 8
            if grep -q "slider_value" app/src/main/res/layout/preference_widget_slider.xml 2>/dev/null; then
              echo "PASS: slider_value found"
            else
              echo "FAIL: slider_value NOT found"
            fi

            # Check 9
            if grep -q "import.*LabelBehavior" app/src/main/java/moe/echo/variablefonttest_n/SliderPreference.kt 2>/dev/null; then
              echo "FAIL: LabelBehavior import still present (will not compile)"
            else
              echo "PASS: No LabelBehavior import"
            fi

            # Check 10
            if grep -q "LABEL_FLOATING" app/src/main/java/moe/echo/variablefonttest_n/SliderPreference.kt 2>/dev/null; then
              echo "PASS: LABEL_FLOATING constant defined"
            else
              echo "FAIL: LABEL_FLOATING constant NOT found"
            fi

            # Check 11
            if grep -q "android:seekBarStyle" app/src/main/res/values-night/themes.xml 2>/dev/null; then
              echo "PASS: android:seekBarStyle found in values-night/themes.xml"
            else
              echo "FAIL: android:seekBarStyle NOT found in values-night/themes.xml"
            fi
            echo '```'
          } > "$REPORT"

          cat "$REPORT"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: layout-fix-verify
          path: layout_fix_verify.txt
          retention-days: 14