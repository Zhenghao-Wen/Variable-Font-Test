name: Runtime Divider Diagnosis

on:
  workflow_dispatch:
  push:
    branches:
      - QwenMirror

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: QwenCode
          fetch-depth: 1

      - name: Inject diagnostic code
        shell: bash
        run: |
          set -euo pipefail
          FILE="app/src/main/java/moe/echo/variablefonttest_n/OptionsFragment.kt"

          if [ ! -f "$FILE" ]; then
            echo "❌ ERROR: $FILE not found"
            exit 1
          fi

          # 精确匹配标记行（含 / 转义）
          MARKER='\/\/ ── 恢复预览文本的字体可变\/特性设置 ──'
          if ! grep -q "$MARKER" "$FILE"; then
            echo "❌ ERROR: Marker not found in $FILE"
            exit 1
          fi

          sed -i "/$MARKER/ i\\
          \        // ══ DIAGNOSTIC: Divider source detection ══\\
          \        android.util.Log.d(\"DIVIDER_DIAG\", \"RecyclerView ItemDecoration count: \" + listView.itemDecorationCount)\\
          \        for (i in 0 until listView.itemDecorationCount) {\\
          \            android.util.Log.d(\"DIVIDER_DIAG\", \"ItemDecoration[\$i]: \" + listView.getItemDecorationAt(i).javaClass.name)\\
          \        }\\
          \        listView.post {\\
          \            val childCount = listView.childCount\\
          \            android.util.Log.d(\"DIVIDER_DIAG\", \"RecyclerView childCount: \$childCount\")\\
          \            for (i in 0 until childCount) {\\
          \                val child = listView.getChildAt(i)\\
          \                val holder = listView.getChildViewHolder(child)\\
          \                android.util.Log.d(\"DIVIDER_DIAG\", \"Child[\$i]: viewType=\${holder.itemViewType}, class=\${holder.javaClass.simpleName}, height=\${child.height}, top=\${child.top}\")\\
          \                if (child is android.view.ViewGroup) {\\
          \                    for (j in 0 until child.childCount) {\\
          \                        val subChild = child.getChildAt(j)\\
          \                        if (subChild.height <= 3 && subChild.width > 100) {\\
          \                            android.util.Log.d(\"DIVIDER_DIAG\", \"  SUSPECT DIVIDER in Child[\$i].child[\$j]: \${subChild.javaClass.name}, h=\${subChild.height}, w=\${subChild.width}, bg=\${subChild.background}\")\\
          \                        }\\
          \                    }\\
          \                }\\
          \            }\\
          \        }\\
          \        // ══ END DIAGNOSTIC ══\\
          " "$FILE"

          echo "✅ Injection completed."

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x gradlew
          echo "Building debug APK..."
          if ! ./gradlew app:assembleDebug 2>&1; then
            echo "❌ Build failed. Check logs above."
            exit 1
          fi
          echo "✅ Build succeeded."

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error

      - name: Show injected code
        shell: bash
        run: |
          echo "=== Injected diagnostic code ==="
          grep -n -A 25 "DIVIDER_DIAG" app/src/main/java/moe/echo/variablefonttest_n/OptionsFragment.kt | head -30