name: Verify LabelBehavior API

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: QwenCode
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download material AAR and inspect
        run: |
          echo "=== Downloading material-1.12.0.aar ==="
          curl -sL "https://dl.google.com/dl/android/maven2/com/google/android/material/material/1.12.0/material-1.12.0.aar" \
            -o material.aar

          echo ""
          echo "=== Extracting classes.jar ==="
          unzip -o material.aar classes.jar -d material_extracted

          echo ""
          echo "=== All classes in com.google.android.material.slider ==="
          jar tf material_extracted/classes.jar | grep "com/google/android/material/slider/" | sort

          echo ""
          echo "=== Searching for LabelBehavior ==="
          jar tf material_extracted/classes.jar | grep -i "labelbehavior" || echo "NOT FOUND as standalone class"

          echo ""
          echo "=== Searching for BaseSlider ==="
          jar tf material_extracted/classes.jar | grep -i "baseslider" | head -20

          echo ""
          echo "=== Checking Slider class for LABEL_ constants ==="
          mkdir -p classcheck
          cd classcheck
          jar xf ../material_extracted/classes.jar com/google/android/material/slider/Slider.class 2>/dev/null || true
          jar xf ../material_extracted/classes.jar com/google/android/material/slider/BaseSlider.class 2>/dev/null || true
          if [ -f com/google/android/material/slider/BaseSlider.class ]; then
            echo "--- BaseSlider fields ---"
            javap -p com/google/android/material/slider/BaseSlider.class 2>/dev/null | grep -i "label\|FLOATING\|WITHIN\|GONE" || echo "No label constants found"
          fi
          if [ -f com/google/android/material/slider/Slider.class ]; then
            echo "--- Slider fields ---"
            javap -p com/google/android/material/slider/Slider.class 2>/dev/null | grep -i "label\|FLOATING\|WITHIN\|GONE" || echo "No label constants found"
          fi

          echo ""
          echo "=== Checking for LabelBehavior inner class ==="
          jar tf ../material_extracted/classes.jar | grep -i "BaseSlider\$" | head -20

          echo ""
          echo "=== Current SliderPreference.kt (error source) ==="
          cat ../app/src/main/java/moe/echo/variablefonttest_n/SliderPreference.kt

      - name: Upload inspection log
        uses: actions/upload-artifact@v4
        with:
          name: labelbehavior-inspection
          path: |
            material_extracted/
            classcheck/
          retention-days: 7