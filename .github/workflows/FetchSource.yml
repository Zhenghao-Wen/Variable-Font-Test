name: Verify defStyleAttr Fix

on:
  workflow_dispatch:
  push:
    branches:
      - QwenMirror

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: QwenCode
          fetch-depth: 1

      - name: Check and build
        shell: bash
        run: |
          set -euo pipefail
          FILE="app/src/main/java/moe/echo/variablefonttest_n/MD3SeekBarPreference.kt"

          # 安全读取文件
          safe_cat() {
            if [ -f "$1" ]; then
              cat -n "$1"
            else
              echo "[FILE NOT FOUND] $1"
            fi
          }

          echo "═══ CHECK 1: defStyleAttr value ═══"
          if grep -q "seekBarPreferenceStyle" "$FILE" 2>/dev/null; then
            echo "PASS: defStyleAttr = seekBarPreferenceStyle"
          else
            echo "FAIL: defStyleAttr is NOT seekBarPreferenceStyle"
            # 安全输出实际值（若无匹配则不报错）
            grep "defStyleAttr" "$FILE" 2>/dev/null || echo "(defStyleAttr not found in file)"
          fi

          echo ""
          echo "═══ CHECK 2: No defStyleAttr = 0 ═══"
          if grep -q "defStyleAttr: Int = 0" "$FILE" 2>/dev/null; then
            echo "FAIL: defStyleAttr still defaults to 0"
          else
            echo "PASS: defStyleAttr does not default to 0"
          fi

          echo ""
          echo "═══ CHECK 3: Full file ═══"
          safe_cat "$FILE"

          echo ""
          echo "═══ CHECK 4: Compile ═══"
          chmod +x gradlew
          # 执行编译，无论如何都输出最后5行（包括错误）
          ./gradlew app:compileReleaseKotlin 2>&1 | tail -5 || true
          # 检查编译是否成功
          if ./gradlew app:compileReleaseKotlin --dry-run 2>/dev/null; then
            echo "Compilation check completed (dry-run)"
          else
            echo "Compilation may have failed, check logs above"
          fi

      - name: Upload report (optional)
        if: always()
        run: |
          # 将输出保存为artifact（如果需要）
          echo "Verification completed" > verify_result.txt
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: defstyleattr-verify
          path: verify_result.txt
          retention-days: 14
          if-no-files-found: warn