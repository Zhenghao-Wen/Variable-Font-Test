name: Extract Source for Divider + State Fix

on:
  workflow_dispatch:
  push:
    branches:
      - QwenMirror

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: QwenCode
          fetch-depth: 1

      - name: Build report
        shell: bash
        run: |
          set -euo pipefail
          R="divider_state_fix.txt"

          # 安全读取文件
          safe_cat() {
            if [ -f "$1" ]; then
              cat "$1"
            else
              echo "[FILE NOT FOUND] $1"
            fi
          }

          # 安全执行 sed（模式匹配失败或文件不存在都返回空）
          safe_sed() {
            if [ -f "$1" ]; then
              sed -n "$2" "$1" 2>/dev/null || echo "(pattern not found)"
            else
              echo "[FILE NOT FOUND] $1"
            fi
          }

          {
            echo "# Divider + State Fix Diagnosis"
            echo "# Commit: $(git rev-parse HEAD)"
            echo "# Date: $(date -u)"
            echo ""

            echo "## [1] preference_widget_slider.xml (FULL)"
            echo '```xml'
            safe_cat app/src/main/res/layout/preference_widget_slider.xml
            echo '```'
            echo ""

            echo "## [2] SliderPreference.kt (FULL)"
            echo '```kotlin'
            safe_cat app/src/main/java/moe/echo/variablefonttest_n/SliderPreference.kt
            echo '```'
            echo ""

            echo "## [3] OptionsFragment.kt – onViewCreated (FULL method)"
            echo '```kotlin'
            safe_sed app/src/main/java/moe/echo/variablefonttest_n/OptionsFragment.kt '/override fun onViewCreated/,/^ private fun MutableMap/p'
            echo '```'
            echo ""

            echo "## [4] OptionsFragment.kt – class-level fields + onSaveInstanceState check"
            echo '```kotlin'
            safe_sed app/src/main/java/moe/echo/variablefonttest_n/OptionsFragment.kt '1,60p'
            echo '```'
            echo ""

            echo "## [5] OptionsFragment.kt – onSaveInstanceState exists?"
            echo '```'
            grep -n "onSaveInstanceState\|savedInstanceState\|fontVariationSettings\|fontFeatureSettings" \
              app/src/main/java/moe/echo/variablefonttest_n/OptionsFragment.kt 2>/dev/null || echo "(no matching lines)"
            echo '```'
            echo ""

            echo "## [6] MainActivity.kt – recreate() context"
            echo '```kotlin'
            grep -n -B 3 -A 3 "recreate" app/src/main/java/moe/echo/variablefonttest_n/MainActivity.kt 2>/dev/null || echo "(recreate not found)"
            echo '```'
            echo ""

            echo "## [7] options.xml – SeekBarPreference defaultValue check"
            echo '```'
            grep -A 2 "defaultValue" app/src/main/res/xml/options.xml 2>/dev/null || echo "(defaultValue not found)"
            echo '```'
            echo ""

            echo "## [8] Standard SeekBar layout from preference library (if accessible)"
            echo '```'
            # Try to find the standard layout in the Gradle cache
            PREF_AAR=$(find ~/.gradle/caches -name "preference-1.2.1.aar" 2>/dev/null | head -1)
            if [ -n "$PREF_AAR" ]; then
              mkdir -p /tmp/pref_inspect && cd /tmp/pref_inspect
              cp "$PREF_AAR" pref.aar 2>/dev/null || echo "Copy failed"
              unzip -o pref.aar res/layout/preference_widget_seekbar_material.xml -d . 2>/dev/null || true
              if [ -f "res/layout/preference_widget_seekbar_material.xml" ]; then
                cat res/layout/preference_widget_seekbar_material.xml
              else
                echo "Layout not found in AAR (may be in res/ directory)"
                unzip -l pref.aar 2>/dev/null | grep "seekbar" || echo "No seekbar layouts found"
              fi
            else
              echo "Preference AAR not found in Gradle cache"
            fi
            echo '```'
            echo ""

            echo "## [9] themes.xml – surface colors"
            echo '```xml'
            safe_cat app/src/main/res/values/themes.xml
            echo '```'
            echo ""

            echo "## [10] main_fragment_content.xml – RecyclerView/ListView background"
            echo '```xml'
            safe_cat app/src/main/res/layout/main_fragment_content.xml
            echo '```'
            echo ""

            echo "## [11] Automated checks"
            echo '```'
            SL="app/src/main/res/layout/preference_widget_slider.xml"
            if [ -f "$SL" ]; then
              echo "--- marginTop/marginBottom in slider layout ---"
              grep -n "margin" "$SL" 2>/dev/null || echo "(none)"
              echo ""
              echo "--- paddingTop/paddingBottom in slider layout ---"
              grep -n "padding" "$SL" 2>/dev/null || echo "(none)"
              echo ""
              echo "--- RelativeLayout in slider layout ---"
              grep -c "RelativeLayout" "$SL" 2>/dev/null || echo "0"
              echo ""
              echo "--- background attributes in slider layout ---"
              grep -n "background" "$SL" 2>/dev/null || echo "(none)"
              echo ""
              echo "--- clipChildren/clipToPadding in slider layout ---"
              grep -n "clip" "$SL" 2>/dev/null || echo "(none)"
            else
              echo "Slider layout file not found"
            fi
            echo '```'
          } > "$R"

          cat "$R"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: divider-state-fix
          path: divider_state_fix.txt
          retention-days: 14